dataset: cifar10

# ╔══════════════════════════════════════════════╗
# ║   🌐 Federated Playground   (•̀ᴗ•́)و        ║
# ╚══════════════════════════════════════════════╝
num_clients: 10
dirichlet_alpha: 0.1

# ────────────────────────────────────────────────
# 🧠 Backbone Architecture   (⌐■_■)
# ────────────────────────────────────────────────
backbone: resnet18

# ────────────────────────────────────────────────
# 🎲 Reproducibility & Seeds   (っ˘ڡ˘ς)
# ────────────────────────────────────────────────
seed: 42

# ────────────────────────────────────────────────
# 📂 Paths & Storage   (っ◔◡◔)っ
# ────────────────────────────────────────────────
data_root: ./data
stats_root: ./client_stats_X

# ────────────────────────────────────────────────
# 📊 Evaluation Setup   (•_•)📈
# ────────────────────────────────────────────────
test_batch: 256
num_workers: 4

# ════════════════════════════════════════════════
# 📉 Gaussian Shrinkage Parameters   (－‸ლ)
# ════════════════════════════════════════════════
lda_shrink: 0.05
qda_shrink: 0.1

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🔬 Fisher Subspace   (ง •̀_•́)ง
# (CIFAR-10 → C=10 → max useful dim ≈ 9)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
fisher_energy: 0.995
fisher_max_dim: 16

# ╭──────────────────────────────────────────────╮
# 🧪 Synthetic Fisher Generation   (づ｡◕‿‿◕｡)づ
# ╰──────────────────────────────────────────────╯
syn_ns_per_class: 4000
syn_tau_base: 0.9
syn_tau_clip: [0.6, 1.4]
syn_shrink: 0.05
syn_use_class_cov: true

# ────────────────────────────────────────────────
# ⚡ FisherMix (Linear Head)   (☞ﾟヮﾟ)☞
# ────────────────────────────────────────────────
fm_epochs: 40
fm_batch: 2048
fm_lr: 0.0008
fm_wd: 0.0003

# ────────────────────────────────────────────────
# 🧩 Proto-Hyper Module   (•̀ω•́)✧
# ────────────────────────────────────────────────
ph_epochs: 40
ph_batch: 1024
ph_lr: 0.001
ph_wd: 0.0005
ph_rank: 16

# ────────────────────────────────────────────────
# 🔥 Knowledge Distillation   (¬‿¬)
# ────────────────────────────────────────────────
kd_alpha: 0.4
kd_T: 4.0
teacher_blend: 0.7