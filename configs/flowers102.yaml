dataset: flowers102

# ==================================================
# Federated setup
# ==================================================
num_clients: 10
dirichlet_alpha: 0.1

# ==================================================
# Backbone
# ==================================================
backbone: resnet18

# ==================================================
# Reproducibility
# ==================================================
seed: 42

# ==================================================
# Paths
# ==================================================
data_root: ./data
stats_root: ./client_stats_X

# ==================================================
# Evaluation
# ==================================================
test_batch: 256
num_workers: 4

# ==================================================
# Gaussian shrinkage (paper-style stable)
# ==================================================
lda_shrink: 0.05
qda_shrink: 0.05

# ==================================================
# Fisher subspace
# ==================================================
fisher_energy: 0.995
fisher_max_dim: 256

# ==================================================
# Synthetic Fisher generation
# ==================================================
syn_ns_per_class: 3000
syn_tau_base: 0.9
syn_tau_clip: [0.6, 1.4]
syn_shrink: 0.05
syn_use_class_cov: true

# ==================================================
# FisherMix (LINEAR head)
# ==================================================
fm_epochs: 80
fm_batch: 2048
fm_lr: 0.0008
fm_wd: 0.0003

# ==================================================
# Proto-Hyper
# ==================================================
ph_epochs: 40
ph_batch: 1024
ph_lr: 0.001
ph_wd: 0.0005
ph_rank: 128

kd_alpha: 0.4
kd_T: 4.0
teacher_blend: 0.7